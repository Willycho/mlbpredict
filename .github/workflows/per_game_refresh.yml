name: Per-Game Refresh

on:
  schedule:
    - cron: '*/15 * * * *'  # 매 15분마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: predictions-write
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run per-game refresh
        env:
          ODDS_API_KEY_PRIMARY: ${{ secrets.ODDS_API_KEY_PRIMARY }}
          ODDS_API_KEY_BACKUP1: ${{ secrets.ODDS_API_KEY_BACKUP1 }}
          ODDS_API_KEY_BACKUP2: ${{ secrets.ODDS_API_KEY_BACKUP2 }}
        run: |
          python scripts/per_game_refresh.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add data/storage/predictions/
          git diff --cached --quiet || git commit -m "chore: refresh $(date -u +%Y-%m-%dT%H:%M)"
          git push || echo "nothing to push"
