name: Per-Game Refresh (Pro)

on:
  schedule:
    # 15분마다, 7분 offset (free와 충돌 방지)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-pro:
    runs-on: ubuntu-latest
    concurrency:
      group: predictions-pro-write
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pybind11

      - name: Cache C++ build
        uses: actions/cache@v4
        with:
          path: |
            engine/cpp/*.so
            engine/cpp/*.pyd
          key: cpp-${{ runner.os }}-${{ hashFiles('engine/cpp/sim_core.cpp', 'engine/cpp/sim_core.h') }}

      - name: Build C++ extension
        run: |
          if ! ls engine/cpp/*.so 1> /dev/null 2>&1; then
            python setup.py build_ext --inplace
          else
            echo "C++ build cached, skipping"
          fi

      - name: Run per-game refresh pro
        env:
          ODDS_API_KEY_PRIMARY: ${{ secrets.ODDS_API_KEY_PRIMARY }}
          ODDS_API_KEY_BACKUP1: ${{ secrets.ODDS_API_KEY_BACKUP1 }}
          ODDS_API_KEY_BACKUP2: ${{ secrets.ODDS_API_KEY_BACKUP2 }}
        run: |
          python scripts/per_game_refresh_pro.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add data/storage/predictions_pro/
          git diff --cached --quiet || git commit -m "chore: refresh pro $(date -u +%Y-%m-%dT%H:%M)"
          git push || echo "nothing to push"
