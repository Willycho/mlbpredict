name: Daily Bulk Predict

on:
  schedule:
    # KST 21:03 = UTC 12:03 (정시 회피, Actions 부하 분산)
    - cron: '3 12 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target KST date (YYYY-MM-DD). Empty = auto'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  bulk-predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily bulk predict
        env:
          ODDS_API_KEY_PRIMARY: ${{ secrets.ODDS_API_KEY_PRIMARY }}
          ODDS_API_KEY_BACKUP1: ${{ secrets.ODDS_API_KEY_BACKUP1 }}
          ODDS_API_KEY_BACKUP2: ${{ secrets.ODDS_API_KEY_BACKUP2 }}
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/daily_bulk_predict.py --date "${{ github.event.inputs.target_date }}"
          else
            python scripts/daily_bulk_predict.py
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/storage/predictions/
          git diff --cached --quiet || git commit -m "chore: daily bulk predict $(date -u +%Y-%m-%d)"
          git push
