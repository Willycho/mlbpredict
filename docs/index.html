<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Predict — RSL Baseball V3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>MLB Predict</h1>
    <p class="subtitle">V3 Pitcher-Matchup + V2 Monte Carlo (GitHub Actions)</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('free')">V3 Free</button>
    <button class="tab pro-tab" onclick="switchTab('pro')">V2+V3 Pro</button>
  </div>

  <div class="controls">
    <input type="date" id="datePicker" />
    <button onclick="loadData()">Load</button>
    <span id="status"></span>
  </div>

  <div id="subTabs" class="sub-tabs" style="display:none">
    <button class="sub-tab active" onclick="switchSubTab('all')">ALL TOP 5</button>
    <button class="sub-tab" onclick="switchSubTab('ml')">ML TOP 5</button>
    <button class="sub-tab" onclick="switchSubTab('ou')">OU TOP 5</button>
  </div>

  <div id="edgePicks" style="display:none"><h2 id="picksTitle">Top Picks</h2><div id="edgeList"></div></div>
  <h2 id="gamesTitle" style="display:none">All Games</h2>
  <div id="games"></div>
</div>

<script>
// GitHub raw URL base — replace with your repo
const REPO_OWNER = 'Willycho';
const REPO_NAME = 'mlbpredict';
const BRANCH = 'main';
const DATA_BASES = {
  free: `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${BRANCH}/data/storage/predictions`,
  pro: `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${BRANCH}/data/storage/predictions_pro`,
};

const $ = id => document.getElementById(id);
let currentTab = 'free';
let currentSubTab = 'all';
let cachedSweet = [];
let cachedGames = [];
let cachedManifest = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab === 'free' ? 1 : 2})`).classList.add('active');
  loadData();
}

// KST 오늘
const now = new Date();
const kst = new Date(now.getTime() + 9 * 3600000);
$('datePicker').value = kst.toISOString().slice(0, 10);

async function loadData() {
  const d = $('datePicker').value;
  const base = DATA_BASES[currentTab];
  $('status').textContent = `Loading ${currentTab.toUpperCase()}...`;
  ['edgePicks','gamesTitle','subTabs'].forEach(id => $(id).style.display = 'none');
  $('games').innerHTML = '';

  try {
    const manifestUrl = `${base}/${d}/manifest.json?_=${Date.now()}`;
    const manifest = await (await fetch(manifestUrl)).json();
    if (!manifest.games) { $('status').textContent = 'No data'; return; }
    cachedManifest = manifest;

    // 개별 경기 파일 병렬 fetch
    const gameDataPromises = manifest.games.map(m =>
      fetch(`${base}/${d}/${m.game_id}.json?_=${Date.now()}`).then(r => r.json()).catch(() => null)
    );
    const gameFiles = await Promise.all(gameDataPromises);

    cachedGames = gameFiles.filter(g => g).map(gf => ({
      ...gf.prediction,
      _file: gf,
    }));

    // Sweet picks 수집
    // - Free: V3 sweet_picks 전부
    // - Pro: manifest.top_picks 사용 (이미 V2 컨센서스 필터링됨)
    if (currentTab === 'pro' && manifest.top_picks) {
      cachedSweet = manifest.top_picks;
    } else {
      cachedSweet = [];
      cachedGames.forEach(p => {
        (p.sweet_picks || []).forEach(sp => {
          if (sp.type !== 'TT') {
            cachedSweet.push({
              ...sp,
              away_team: p.away_team,
              home_team: p.home_team,
              away_pitcher: (p.away_pitcher || {}).name,
              home_pitcher: (p.home_pitcher || {}).name,
            });
          }
        });
      });
      cachedSweet.sort((a, b) => b.conf - a.conf);
    }

    $('subTabs').style.display = 'flex';
    currentSubTab = 'all';
    document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.sub-tab:nth-child(1)').classList.add('active');
    renderSubTabPicks();

    // 경기 카드
    const gradeOrder = { sweet_spot: 0, good: 1, lean: 2, overconf: 3, pass: 4 };
    const sorted = [...cachedGames].sort((a, b) => (gradeOrder[a.grade] || 9) - (gradeOrder[b.grade] || 9));
    $('gamesTitle').style.display = 'block';
    $('gamesTitle').textContent = `All Games (${sorted.length})`;
    $('games').innerHTML = sorted.map(p => gameCard(p)).join('');

    const lastRefresh = manifest.last_modified_at || manifest.generated_at || '';
    $('status').textContent = `${sorted.length} games | updated ${lastRefresh.slice(0, 16).replace('T', ' ')} UTC`;
  } catch (e) {
    $('status').textContent = `Error: ${e.message}`;
  }
}

function switchSubTab(sub) {
  currentSubTab = sub;
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  const idx = { all: 1, ml: 2, ou: 3 }[sub] || 1;
  document.querySelector(`.sub-tab:nth-child(${idx})`).classList.add('active');
  renderSubTabPicks();
}

function renderSubTabPicks() {
  let filtered, title;
  if (currentSubTab === 'all') {
    filtered = cachedSweet.slice(0, 5);
    title = 'ALL TOP 5';
  } else if (currentSubTab === 'ml') {
    filtered = cachedSweet.filter(s => s.type === 'ML').slice(0, 5);
    title = 'ML TOP 5';
  } else {
    filtered = cachedSweet.filter(s => s.type === 'OU').slice(0, 5);
    title = 'OU TOP 5';
  }

  $('edgePicks').style.display = 'block';
  if (filtered.length) {
    $('picksTitle').textContent = `${title} (${filtered.length})`;
    $('edgeList').innerHTML = filtered.map(sp => sweetPickCard(sp)).join('');
  } else {
    $('picksTitle').textContent = `${title} — No picks`;
    $('edgeList').innerHTML = '<div style="color:#64748b;padding:12px">No qualifying picks</div>';
  }
}

function sweetPickCard(sp) {
  const typeColor = { ML: 'A', OU: 'B' }[sp.type] || 'C';
  const typeLabel = { ML: 'ML', OU: 'GAME O/U' }[sp.type] || sp.type;
  const lu = sp.lineup || 'roster';
  const luCls = lu === 'confirmed' ? 'lu-api' : lu === 'partial' ? 'lu-partial' : 'lu-default';
  const luLabel = lu === 'confirmed' ? 'Lineup' : lu === 'partial' ? 'Partial' : `Roster`;
  return `<div class="edge g-${typeColor}">
    <div class="edge-top"><strong>${sp.away_team}@${sp.home_team}</strong>
      <span class="edge-sp">${sp.away_pitcher || '?'} vs ${sp.home_pitcher || '?'}</span>
      <span class="badge g-${typeColor}">${typeLabel}</span>
      <span class="lineup-tag ${luCls}">${luLabel}</span></div>
    <div class="edge-det"><strong>${sp.pick}</strong> (${(sp.conf * 100).toFixed(0)}%) | ${sp.detail}</div></div>`;
}

// Free = 좁은 카드, Pro = 상세 (투수 바 + 구종 테이블 + 팀토탈)
function gameCard(p) {
  if (!p.pick) {
    return `<div class="game compact"><div class="game-top"><span class="matchup">${p.away_team} @ ${p.home_team}</span></div>
      <div class="sp">TBD</div></div>`;
  }

  if (currentTab === 'pro') return proGameCard(p);
  return freeGameCard(p);
}

function freeGameCard(p) {
  const ap = p.away_pitcher || {};
  const hp = p.home_pitcher || {};
  let gradeBadge = '';
  if (p.grade === 'sweet_spot') gradeBadge = '<span class="badge g-A">SWEET SPOT</span>';
  else if (p.grade === 'good') gradeBadge = '<span class="badge g-B">GOOD</span>';
  else if (p.grade === 'lean') gradeBadge = '<span class="badge g-C">LEAN</span>';
  else if (p.grade === 'overconf') gradeBadge = '<span class="badge g-FLAG">HIGH CONF</span>';

  const timeStr = p.game_time_kst ? `<span class="game-time">${p.game_time_kst} KST</span>` : '';
  const refreshTag = p._file && p._file.refresh_type === 'per_game'
    ? '<span class="lineup-tag lu-api">Refreshed</span>'
    : '<span class="lineup-tag lu-default">Bulk</span>';

  return `<div class="game compact">
    <div class="game-top"><span class="matchup">${p.away_team} @ ${p.home_team}</span>${gradeBadge}${timeStr}</div>
    <div class="sp">${ap.name || 'TBD'} (${ap.throws || '?'}) vs ${hp.name || 'TBD'} (${hp.throws || '?'})</div>
    <div class="pred">PICK: <strong>${p.pick}</strong> (${(p.pick_prob * 100).toFixed(0)}%) | F5 Total: ${p.expected_total}
      ${refreshTag}</div>
  </div>`;
}

function proGameCard(p) {
  const ap = p.away_pitcher || {};
  const hp = p.home_pitcher || {};

  let gradeBadge = '';
  if (p.grade === 'sweet_spot') gradeBadge = '<span class="badge g-A">SWEET SPOT</span>';
  else if (p.grade === 'good') gradeBadge = '<span class="badge g-B">GOOD</span>';
  else if (p.grade === 'lean') gradeBadge = '<span class="badge g-C">LEAN</span>';
  else if (p.grade === 'overconf') gradeBadge = '<span class="badge g-FLAG">HIGH CONF</span>';

  let consensusBadge = '';
  if (p.consensus === true) consensusBadge = '<span class="badge g-A" style="font-size:0.6rem">V2 AGREE</span>';
  else if (p.consensus === false) consensusBadge = '<span class="badge g-FLAG" style="font-size:0.6rem">DISAGREE</span>';

  const ouBadge = p.ou_consensus ? '<span class="badge g-B" style="font-size:0.55rem">O/U AGREE</span>' : '';

  const timeStr = p.game_time_kst ? `<span class="game-time">${p.game_time_kst} KST</span>` : '';

  const aw = Math.min(ap.total_score || 50, 100);
  const hw = Math.min(hp.total_score || 50, 100);

  const v2Info = p.v2_pick ? ` | V2: <strong>${p.v2_pick}</strong> (${(p.v2_conf * 100).toFixed(0)}%)` : '';

  return `<div class="game">
    <div class="game-top"><span class="matchup">${p.away_team} @ ${p.home_team}</span>${gradeBadge}${consensusBadge}${ouBadge}${timeStr}</div>
    <div class="sp">${ap.name || 'TBD'} (${ap.throws || '?'}) vs ${hp.name || 'TBD'} (${hp.throws || '?'})</div>
    <div class="v3-scores">
      <div class="v3-pitcher">
        <div class="v3-name">${ap.name || 'TBD'}${ap.no_data ? ' <span class="no-data-tag">NO DATA</span>' : ''} <span class="v3-total">${ap.total_score || '?'}</span></div>
        <div class="v3-bar-wrap"><div class="v3-bar away" style="width:${aw}%"></div></div>
        <div class="v3-sub">Season ${ap.season_score || '?'} | Arsenal ${ap.arsenal_score || '?'} | Form ${ap.recent_form_score || 'N/A'}${ap.home_away_adj ? ' | H/A ' + (ap.home_away_adj > 0 ? '+' : '') + ap.home_away_adj : ''}</div>
      </div>
      <div class="v3-pitcher">
        <div class="v3-name">${hp.name || 'TBD'}${hp.no_data ? ' <span class="no-data-tag">NO DATA</span>' : ''} <span class="v3-total">${hp.total_score || '?'}</span></div>
        <div class="v3-bar-wrap"><div class="v3-bar home" style="width:${hw}%"></div></div>
        <div class="v3-sub">Season ${hp.season_score || '?'} | Arsenal ${hp.arsenal_score || '?'} | Form ${hp.recent_form_score || 'N/A'}${hp.home_away_adj ? ' | H/A ' + (hp.home_away_adj > 0 ? '+' : '') + hp.home_away_adj : ''}</div>
      </div>
    </div>
    <div class="pred">V3: <strong>${p.pick}</strong> (${(p.pick_prob * 100).toFixed(0)}%)${v2Info} | F5 Total: ${p.expected_total}
      ${proLineupTag(p)}</div>
    ${proTeamTotals(p)}
    ${proPitchTable(p)}
  </div>`;
}

function proLineupTag(p) {
  const am = p.away_matchup || {};
  const hm = p.home_matchup || {};
  const aSrc = am.lineup_source || 'roster';
  const hSrc = hm.lineup_source || 'roster';
  const aN = am.n_batters || '?';
  const hN = hm.n_batters || '?';

  if (aSrc === 'lineup' && hSrc === 'lineup') return '<span class="lineup-tag lu-api">Lineup Confirmed</span>';
  if (aSrc === 'lineup' || hSrc === 'lineup') return '<span class="lineup-tag lu-partial">Partial Lineup</span>';
  return `<span class="lineup-tag lu-default">Roster (${aN}+${hN})</span>`;
}

function proTeamTotals(p) {
  const att = p.away_team_total;
  const htt = p.home_team_total;
  if (!att || !htt) return '';
  const awCls = att.gap >= 0.3 ? (att.pick === 'UNDER' ? 'tt-strong-u' : 'tt-strong-o') : '';
  const hmCls = htt.gap >= 0.3 ? (htt.pick === 'UNDER' ? 'tt-strong-u' : 'tt-strong-o') : '';
  const awBar = Math.min(att.expected / 5 * 100, 100);
  const hmBar = Math.min(htt.expected / 5 * 100, 100);
  return `<div class="team-totals">
    <div class="tt-row">
      <span class="tt-team">${p.away_team}</span>
      <div class="tt-bar-wrap"><div class="tt-bar" style="width:${awBar}%"></div></div>
      <span class="tt-exp">${att.expected}R</span>
      <span class="tt-pick ${awCls}">${att.pick} ${att.line}</span>
    </div>
    <div class="tt-row">
      <span class="tt-team">${p.home_team}</span>
      <div class="tt-bar-wrap"><div class="tt-bar" style="width:${hmBar}%"></div></div>
      <span class="tt-exp">${htt.expected}R</span>
      <span class="tt-pick ${hmCls}">${htt.pick} ${htt.line}</span>
    </div>
  </div>`;
}

function proPitchTable(p) {
  const awayDetail = p.away_pitch_detail || [];
  const homeDetail = p.home_pitch_detail || [];
  if (!awayDetail.length && !homeDetail.length) return '';

  let html = '<div class="v3-pitch-tables">';

  if (awayDetail.length) {
    html += `<div class="v3-pitch-tbl"><div class="v3-tbl-title">${(p.away_pitcher || {}).name || ''} vs ${p.home_team}</div>
      <table><tr><th>Pitch</th><th>Usage</th><th>P.xwOBA</th><th>Team</th><th>Lg</th><th>Adv</th></tr>`;
    awayDetail.forEach(d => {
      const cls = d.advantage > 0.005 ? 'adv-good' : d.advantage < -0.005 ? 'adv-bad' : '';
      html += `<tr class="${cls}"><td>${d.pitch_type}</td><td>${(d.usage * 100).toFixed(0)}%</td><td>${d.pitcher_xwoba.toFixed(3)}</td><td>${d.team_xwoba.toFixed(3)}</td><td>${d.league_xwoba.toFixed(3)}</td><td>${d.advantage > 0 ? '+' : ''}${(d.advantage * 1000).toFixed(0)}</td></tr>`;
    });
    html += '</table></div>';
  }

  if (homeDetail.length) {
    html += `<div class="v3-pitch-tbl"><div class="v3-tbl-title">${(p.home_pitcher || {}).name || ''} vs ${p.away_team}</div>
      <table><tr><th>Pitch</th><th>Usage</th><th>P.xwOBA</th><th>Team</th><th>Lg</th><th>Adv</th></tr>`;
    homeDetail.forEach(d => {
      const cls = d.advantage > 0.005 ? 'adv-good' : d.advantage < -0.005 ? 'adv-bad' : '';
      html += `<tr class="${cls}"><td>${d.pitch_type}</td><td>${(d.usage * 100).toFixed(0)}%</td><td>${d.pitcher_xwoba.toFixed(3)}</td><td>${d.team_xwoba.toFixed(3)}</td><td>${d.league_xwoba.toFixed(3)}</td><td>${d.advantage > 0 ? '+' : ''}${(d.advantage * 1000).toFixed(0)}</td></tr>`;
    });
    html += '</table></div>';
  }

  html += '</div>';
  return html;
}

loadData();
</script>
</body>
</html>
